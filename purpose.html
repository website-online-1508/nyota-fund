<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purpose - NYOTA FUND</title>
<link rel="stylesheet" href="style.css">
<style>
  body { font-family: 'Segoe UI', sans-serif; background:#f3f6f8; margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .container { background:#fff; padding:30px 25px; border-radius:12px; max-width:480px; width:95%; box-shadow:0 8px 24px rgba(0,0,0,0.1); }
  h2 { font-size:21px; margin-bottom:24px; color:#0b3b57; text-align:center; }
  form { display:flex; flex-direction:column; gap:14px; }
  .option-btn { border:1px solid #d1d5db; border-radius:10px; padding:14px 18px; cursor:pointer; display:flex; align-items:center; transition:0.25s; font-size:16px; color:#0b3b57; background:#fff; }
  .option-btn:hover { background:#f0f7ff; border-color:#0b4f7a; }
  .option-btn.selected { background:#0b4f7a; color:#fff; border-color:#0b4f7a; }
  .option-btn input { display:none; }
  .note { font-size:13px; color:#555; margin-top:12px; font-style:italic; text-align:center; }
  button { margin-top:22px; background:#0b4f7a; color:#fff; border:none; padding:14px; font-size:16px; border-radius:8px; cursor:pointer; width:100%; display:flex; justify-content:center; align-items:center; transition:0.2s; }
  button:disabled { opacity:0.7; cursor:not-allowed; }
  .btn-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.6); border-top-color:#fff; border-radius:50%; margin-right:8px; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <h2>Select your main purpose after receiving NYOTA funds</h2>

  <form id="purposeForm">
    <label class="option-btn">
      <input type="radio" name="purpose" value="Start a business" required>
      Start a business
    </label>

    <label class="option-btn">
      <input type="radio" name="purpose" value="Top up a business">
      Top up a business
    </label>

    <label class="option-btn">
      <input type="radio" name="purpose" value="Pay school fees">
      Pay school fees
    </label>

    <label class="option-btn">
      <input type="radio" name="purpose" value="Pay bills">
      Pay bills
    </label>

    <label class="option-btn">
      <input type="radio" name="purpose" value="Pay rent">
      Pay rent
    </label>

    <p class="note">Note: Kindly use your NYOTA FUNDS wisely.</p>

    <button type="submit" id="continueBtn">Continue</button>
  </form>
</div>

<script>
  const userPhone = localStorage.getItem("userPhone");
  if(!userPhone) window.location.href = "register.html";

  const form = document.getElementById("purposeForm");
  const continueBtn = document.getElementById("continueBtn");
  const options = document.querySelectorAll('.option-btn');

  // Highlight selected option
  options.forEach(option => {
    const input = option.querySelector('input');
    option.addEventListener('click', ()=>{
      options.forEach(o => o.classList.remove('selected'));
      input.checked = true;
      option.classList.add('selected');
    });
  });

  form.addEventListener('submit', e=>{
    e.preventDefault();
    const selected = document.querySelector('input[name="purpose"]:checked');
    if(!selected){
      alert("Please select one option to continue.");
      return;
    }

    const originalText = continueBtn.innerHTML;
    continueBtn.disabled = true;
    continueBtn.innerHTML = '<span class="btn-spinner"></span>Processing...';

    setTimeout(()=>{
      try{
        const key = 'nyota_users';
        let users = JSON.parse(localStorage.getItem(key)||'[]');
        const idx = users.findIndex(u=>u.phone===userPhone);
        const purposeObj = { purpose:selected.value, purposeUpdatedAt:new Date().toISOString() };
        if(idx>=0) users[idx] = Object.assign({}, users[idx], purposeObj);
        else users.push(Object.assign({phone:userPhone}, purposeObj));
        localStorage.setItem(key, JSON.stringify(users));
        window.location.href="amount.html";
      } catch(err){
        continueBtn.disabled = false;
        continueBtn.innerHTML = originalText;
        alert("Error saving data locally. Please try again.");
        console.error(err);
      }
    }, 1200);
  });
</script>

</body>
</html>
