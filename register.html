<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - NYOTA FUND</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background:#0b3b57;
    }

    .container {
      background:#fff;
      border-radius:12px;
      padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      text-align:center;
      color:#0b3b57;
      font-size:20px;
      margin-bottom:15px;
    }

    .nyota-field{position:relative;}
    .nyota-status{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      width:22px;
      height:22px;
    }

    .nyota-status svg{width:18px;height:18px;}
    .nyota-status.n-success svg{fill:#16a34a;}
    .nyota-status.n-error svg{fill:#dc2626;}

    .nyota-error{
      color:#dc2626;
      font-size:12px;
      margin-top:4px;
      display:none;
    }
    .nyota-error.show{display:block;}

    input, select {
      width:100%;
      padding:12px;
      margin-top:6px;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:15px;
    }

    .row {
      display:flex;
      gap:10px;
      margin-top:10px;
    }

    .row > div {
      flex:1;
    }

    #submitBtn{
      background:#0a6ebd;
      color:#fff;
      border:none;
      padding:13px;
      border-radius:8px;
      cursor:pointer;
      width:100%;
      font-size:16px;
      margin-top:15px;
      font-weight:bold;
    }

    #submitBtn:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }

    .footer-note{
      text-align:center;
      margin-top:15px;
      font-size:14px;
      color:#555;
    }

    /* Processing popup */
    #nyotaProcessing{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.5);
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:0.2s;
    }

    #nyotaProcessing.show{
      opacity:1;
      pointer-events:auto;
    }

    .nyota-card{
      background:#fff;
      padding:20px;
      border-radius:12px;
      text-align:center;
      width:90%;
      max-width:400px;
    }

    .spinner{
      width:40px;
      height:40px;
      border:4px solid #eee;
      border-top-color:#0a6ebd;
      border-radius:50%;
      margin:10px auto;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

  </style>
</head>

<body>

<div class="container">
  <h2>NYOTA FUND Registration</h2>

  <form id="registerForm">

    <!-- Full Name -->
    <div class="nyota-field">
      <input type="text" id="fullname" placeholder="Full Name" required>
      <span class="nyota-status"></span>
      <div id="err-fullname" class="nyota-error"></div>
    </div>

    <!-- Phone + ID -->
    <div class="row">
      <div class="nyota-field">
        <input type="text" id="phone" placeholder="Phone Number" required>
        <span class="nyota-status"></span>
        <div id="err-phone" class="nyota-error"></div>
      </div>

      <div class="nyota-field">
        <input type="text" id="idnumber" placeholder="ID Number" required>
        <span class="nyota-status"></span>
        <div id="err-idnumber" class="nyota-error"></div>
      </div>
    </div>

    <!-- Age + Job -->
    <div class="row">
      <div class="nyota-field">
        <input type="number" id="age" placeholder="Age" required>
        <span class="nyota-status"></span>
        <div id="err-age" class="nyota-error"></div>
      </div>

      <div class="nyota-field">
        <input type="text" id="job" placeholder="Occupation" required>
        <span class="nyota-status"></span>
        <div id="err-job" class="nyota-error"></div>
      </div>
    </div>

    <!-- County -->
    <div class="nyota-field">
      <input type="text" id="county" placeholder="County" required>
      <span class="nyota-status"></span>
      <div id="err-county" class="nyota-error"></div>
    </div>

    <!-- Referral -->
    <div class="nyota-field" style="margin-top:10px;">
      <select id="referral">
        <option>Hon President William Ruto</option>
        <option>Facebook</option>
        <option>Twitter</option>
        <option>Friend / Relative</option>
        <option>Radio</option>
        <option>TV</option>
        <option>Other</option>
      </select>

      <div id="other-container" style="display:none;margin-top:8px;">
        <input type="text" id="otherReferral" placeholder="Specify source">
      </div>
    </div>

    <button id="submitBtn" disabled>Submit Application</button>

  </form>

  <p class="footer-note">🇰🇪 NYOTA FUND KENYA APPROVED 🇰🇪</p>
</div>

<!-- Processing -->
<div id="nyotaProcessing">
  <div class="nyota-card">
    <h3>Processing Application...</h3>
    <div class="spinner"></div>
    <p>Please wait while we verify your details</p>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// VALIDATION
function validPhone(p){
  return /^07\d{8}$/.test(p) || /^01\d{8}$/.test(p);
}

function validate(){
  let ok = true;

  if($("fullname").value.length < 3) ok = false;
  if(!validPhone($("phone").value)) ok = false;
  if(!/^\d{6,12}$/.test($("idnumber").value)) ok = false;
  if($("age").value < 18) ok = false;
  if($("job").value.length < 2) ok = false;
  if($("county").value.length < 2) ok = false;

  $("submitBtn").disabled = !ok;
}

// INPUT LISTENERS
["fullname","phone","idnumber","age","job","county"].forEach(id=>{
  $(id).addEventListener("input", validate);
});

// REFERRAL
$("referral").addEventListener("change",()=>{
  $("other-container").style.display =
    $("referral").value === "Other" ? "block" : "none";
});

// SUBMIT
$("registerForm").addEventListener("submit", e=>{
  e.preventDefault();

  const user = {
  fullname: $("fullname").value,
  phone: $("phone").value,
  idnumber: $("idnumber").value,
  age: $("age").value,
  job: $("job").value,
  county: $("county").value,
  referral: $("referral").value
};

  localStorage.setItem("nyota_users", JSON.stringify([user]));
  localStorage.setItem("userPhone", user.phone);

  // SHOW PROCESSING
  $("nyotaProcessing").classList.add("show");

  setTimeout(()=>{
    window.location.href = "purpose.html";
  }, 2500);
});
</script>

</body>
</html>
